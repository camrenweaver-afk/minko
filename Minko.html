<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>Minko — Travel Journal</title>
<link rel="icon" href="logo.png"/>
<link rel="apple-touch-icon" href="logo.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #ece8df; font-family: 'Inter', -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  #root { width: 100%; height: 100%; }
  @keyframes minko-fade-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
  ::-webkit-scrollbar { width: 0; height: 0; }
  button { font-family: inherit; }
  input, textarea { font-family: inherit; }
</style>
<script>
  /* --status-h: height of the "status bar" zone above the floating search pill.
     Desktop (inside IOSDevice, no real safe-area): 58px.
     Mobile (real device): 0 — env(safe-area-inset-top) handles it instead. */
  document.documentElement.style.setProperty('--status-h', window.innerWidth <= 600 ? '0px' : '58px');
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.12.0/mapbox-gl.css" rel="stylesheet"/>
<script src="https://api.mapbox.com/mapbox-gl-js/v3.12.0/mapbox-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.local.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx?v=6"></script>
<script type="text/babel" src="tweaks-panel.jsx?v=5"></script>
<script type="text/babel" src="data.jsx?v=5"></script>
<script type="text/babel" src="icons.jsx?v=6"></script>
<script type="text/babel" src="globe.jsx?v=13"></script>
<script type="text/babel" src="screens.jsx?v=18"></script>
<script type="text/babel" src="flows.jsx?v=43"></script>
<script type="text/babel" src="supabase-client.jsx?v=2"></script>
<script type="text/babel" src="onboarding.jsx?v=7"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "dark": false,
  "accent": "#98c1eb",
  "homeVariant": "photo"
}/*EDITMODE-END*/;

function normalizeEntry(e) {
  return {
    ...e,
    date: e.date_visited
      ? new Date(e.date_visited + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: '2-digit', year: 'numeric' })
      : '',
    photos: Array.isArray(e.photos) ? e.photos : [],
    links: Array.isArray(e.links) ? e.links : [],
    likes: e.likes || 0,
    likedByMe: false,
    comments: [],
  };
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreen] = useState('home');
  const [activePin, setActivePin] = useState(null);
  const [showPreview, setShowPreview] = useState(false);
  const [showDetail, setShowDetail] = useState(false);
  const [showLog, setShowLog] = useState(false);
  const [showLogPicker, setShowLogPicker] = useState(false);
  const [showLocationPicker, setShowLocationPicker] = useState(false);
  const [logPickerPlace, setLogPickerPlace] = useState(null);
  const [showWishlistAdd, setShowWishlistAdd] = useState(false);
  const [wishlistRefreshKey, setWishlistRefreshKey] = useState(0);
  const [showEdit, setShowEdit] = useState(false);
  const [showAddPhoto, setShowAddPhoto] = useState(false);
  const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
  const [logKey, setLogKey] = useState(0);
  const [editKey, setEditKey] = useState(0);
  const [photoKey, setPhotoKey] = useState(0);
  const [activeFriendPin, setActiveFriendPin] = useState(null);
  const [friendEntries, setFriendEntries] = useState([]);
  const [friendsRefreshKey, setFriendsRefreshKey] = useState(0);
  const [showFriendProfile, setShowFriendProfile] = useState(false);
  const [user, setUser] = useState(null);
  const [authReady, setAuthReady] = useState(false);
  const [onboardingDismissed, setOnboardingDismissed] = useState(false);
  const [entries, setEntries] = useState([]);
  const [wishlistCount, setWishlistCount] = useState(0);

  useEffect(() => {
    const { data: { subscription } } = window.sb.auth.onAuthStateChange((event, session) => {
      setUser(session?.user || null);
      if (event === 'INITIAL_SESSION') setAuthReady(true);
      if (session?.user && (event === 'SIGNED_IN' || event === 'USER_UPDATED')) {
        const u = session.user;
        window.sb.from('profiles').upsert({
          id: u.id,
          display_name: u.user_metadata?.full_name || u.email?.split('@')[0] || 'User',
          avatar_url: u.user_metadata?.avatar_url || null,
          updated_at: new Date().toISOString(),
        }, { onConflict: 'id' }).then(() => {});
      }
    });
    return () => subscription.unsubscribe();
  }, []);

  useEffect(() => {
    if (!user) { setEntries([]); setWishlistCount(0); return; }
    window.sb.from('entries').select('*').eq('user_id', user.id).order('created_at', { ascending: false })
      .then(({ data }) => setEntries((data || []).map(normalizeEntry)));
    window.sb.from('wishlist').select('id', { count: 'exact', head: true }).eq('user_id', user.id)
      .then(({ count }) => setWishlistCount(count || 0));
  }, [user?.id]);

  const refreshEntries = () => {
    if (!user) return;
    window.sb.from('entries').select('*').eq('user_id', user.id).order('created_at', { ascending: false })
      .then(({ data }) => setEntries((data || []).map(normalizeEntry)));
  };

  const refreshWishlistCount = () => {
    if (!user) return;
    window.sb.from('wishlist').select('id', { count: 'exact', head: true }).eq('user_id', user.id)
      .then(({ count }) => setWishlistCount(count || 0));
  };

  const handleWishlistAdded = () => {
    setShowWishlistAdd(false);
    setWishlistRefreshKey(k => k + 1);
    refreshWishlistCount();
  };

  const handleSignOut = async () => {
    await window.sb.auth.signOut();
    setUser(null);
  };

  const dark = t.dark;
  const accent = t.accent;
  const isMobile = window.innerWidth <= 600;

  const resetSheets = () => {
    setShowPreview(false);
    setShowDetail(false);
    setActivePin(null);
    setActiveFriendPin(null);
  };

  const onPinTap = (id) => { setActivePin(id); setShowDetail(true); };
  const onFriendPinTap = (id) => { setActiveFriendPin(id); setShowDetail(true); };

  const navProps = {
    active: screen,
    onChange: (s) => { setScreen(s); resetSheets(); },
    hideNav: showLogPicker || showLocationPicker || showLog || showEdit,
  };

  const activeEntry = entries.find(e => e.id === activePin);
  const activeFriendEntry = friendEntries.find(e => e.id === activeFriendPin);
  const activeFriend = activeFriendEntry?._ownerProfile || null;
  const friendsAtBuca = [];

  const previewEntry = screen === 'friends' ? activeFriendEntry : activeEntry;
  const previewFriend = screen === 'friends' ? activeFriend : null;
  const isFriendMode = screen === 'friends';
  const detailEntry = screen === 'friends' ? activeFriendEntry : activeEntry;

  const appShell = isMobile ? {
    position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
    overflow: 'hidden',
  } : {
    width: 402, height: 874, borderRadius: 48, overflow: 'hidden',
    position: 'relative', flexShrink: 0,
    boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
  };

  return (
    <div style={{
      width: '100%', height: '100%',
      display: isMobile ? 'block' : 'flex',
      alignItems: 'center', justifyContent: 'center',
      background: isMobile
        ? (dark ? '#0e1018' : '#cfe1ee')
        : (dark
          ? 'radial-gradient(ellipse at 50% 30%, #1d1f2c 0%, #0e1018 100%)'
          : 'radial-gradient(ellipse at 50% 30%, #f5f0e4 0%, #e3dccb 100%)'),
      transition: 'background 0.3s',
    }}>
      <div style={appShell}>
        <div style={{ position: 'relative', width: '100%', height: '100%', background: dark ? '#0e1018' : '#cfe1ee', overflow: 'hidden' }}>

          {screen === 'home' && (
            <HomeScreen
              accent={accent} dark={dark}
              variant={t.homeVariant}
              onPin={onPinTap}
              activePinId={activePin}
              navProps={navProps}
              onLog={() => setShowLogPicker(true)}
              entries={entries}
              user={user}
            />
          )}

          {screen === 'friends' && (
            <FriendsScreen
              accent={accent} dark={dark}
              onPin={onFriendPinTap}
              activePinId={activeFriendPin}
              navProps={navProps}
              onLog={() => setShowLogPicker(true)}
              user={user}
              friendEntries={friendEntries}
              onFriendEntriesChange={setFriendEntries}
              onFriendAdded={() => setFriendsRefreshKey(k => k + 1)}
            />
          )}

          {screen === 'profile' && (
            <ProfileScreen
              accent={accent} dark={dark}
              onPin={onPinTap}
              navProps={navProps}
              onLog={() => setShowLogPicker(true)}
              onSignOut={user ? handleSignOut : null}
              entries={entries}
              user={user}
              wishlistCount={wishlistCount}
              wishlistRefreshKey={wishlistRefreshKey}
              onWishlistItemAdded={refreshWishlistCount}
              friendsRefreshKey={friendsRefreshKey}
            />
          )}

          {/* Pin preview sheet (small) */}
          <BottomSheet
            open={showPreview && !showDetail}
            onClose={() => { setShowPreview(false); setActivePin(null); setActiveFriendPin(null); }}
            dark={dark}
          >
            <PinPreview
              entry={previewEntry} dark={dark} accent={accent}
              friend={previewFriend}
              onView={() => setShowDetail(true)}
            />
          </BottomSheet>

          {/* Place detail sheet (full) */}
          <BottomSheet
            open={showDetail}
            onClose={() => { setShowDetail(false); setShowPreview(false); setActivePin(null); setActiveFriendPin(null); }}
            dark={dark}
          >
            <PlaceDetailSheet
              entry={detailEntry} dark={dark} accent={accent}
              friendMode={isFriendMode} friend={isFriendMode ? activeFriend : null}
              friendsAtPlace={[]}
              user={user}
              onClose={() => setShowDetail(false)}
              onEdit={!isFriendMode ? () => { setEditKey(k => k + 1); setShowEdit(true); } : undefined}
              onDelete={!isFriendMode ? () => setShowDeleteConfirm(true) : undefined}
              onPhotosChanged={!isFriendMode ? () => { setPhotoKey(k => k + 1); setShowAddPhoto(true); } : undefined}
              onFriendProfile={isFriendMode && activeFriend ? () => setShowFriendProfile(true) : undefined}
            />
          </BottomSheet>

          {/* Log type picker */}
          <BottomSheet open={showLogPicker} onClose={() => setShowLogPicker(false)} dark={dark}>
            <ActionPickerSheet
              dark={dark} accent={accent}
              onClose={() => setShowLogPicker(false)}
              onLogVisit={() => { setShowLogPicker(false); setLogKey(k => k + 1); setLogPickerPlace(null); setShowLocationPicker(true); }}
              onSaveWishlist={() => { setShowLogPicker(false); setShowWishlistAdd(true); }}
            />
          </BottomSheet>

          {/* Full-screen location picker (step 1 of log entry) */}
          {showLocationPicker && (
            <LocationPickerScreen
              dark={dark}
              accent={accent}
              onConfirm={(place) => { setLogPickerPlace(place); setShowLocationPicker(false); setShowLog(true); }}
              onCancel={() => setShowLocationPicker(false)}
            />
          )}

          {/* Log entry flow (steps 2+3, after location is picked) */}
          <BottomSheet open={showLog} onClose={() => setShowLog(false)} dark={dark}>
            <LogEntryFlow key={logKey}
              dark={dark} accent={accent} user={user}
              initialPlace={logPickerPlace}
              onClose={() => setShowLog(false)}
              onConfirm={() => { setShowLog(false); refreshEntries(); }}
              onBackToPicker={() => { setShowLog(false); setShowLocationPicker(true); }}
            />
          </BottomSheet>

          {/* Wishlist add flow */}
          <BottomSheet open={showWishlistAdd} onClose={() => setShowWishlistAdd(false)} dark={dark}>
            <SaveToWishlistFlow
              dark={dark} accent={accent}
              user={user}
              onClose={() => setShowWishlistAdd(false)}
              onConfirm={handleWishlistAdded}
            />
          </BottomSheet>

          {/* Edit entry */}
          <BottomSheet open={showEdit} onClose={() => setShowEdit(false)} dark={dark}>
            <EditItemFlow key={editKey}
              entry={activeEntry} tableKind="entries" dark={dark} accent={accent}
              onClose={() => setShowEdit(false)}
              onConfirm={() => { setShowEdit(false); refreshEntries(); }}
            />
          </BottomSheet>

          {/* Add / manage photos */}
          <BottomSheet open={showAddPhoto} onClose={() => setShowAddPhoto(false)} dark={dark}>
            <AddPhotoSheet key={photoKey}
              entry={activeEntry} tableKind="entries" user={user} dark={dark} accent={accent}
              onClose={() => setShowAddPhoto(false)}
              onSave={() => { setShowAddPhoto(false); refreshEntries(); }}
            />
          </BottomSheet>

          {/* Delete confirm */}
          <BottomSheet open={showDeleteConfirm} onClose={() => setShowDeleteConfirm(false)} dark={dark}>
            <DeleteConfirmSheet
              entry={activeEntry} tableKind="entries" dark={dark} accent={accent}
              onClose={() => setShowDeleteConfirm(false)}
              onConfirm={() => {
                setShowDeleteConfirm(false);
                setShowDetail(false);
                setShowPreview(false);
                setActivePin(null);
                refreshEntries();
              }}
            />
          </BottomSheet>

          {/* Onboarding — shown when not authenticated and not dismissed */}
          {authReady && !user && !onboardingDismissed && (
            <OnboardingFlow
              dark={dark} accent={accent}
              onComplete={() => { setOnboardingDismissed(true); setShowLog(true); }}
              onSkip={() => setOnboardingDismissed(true)}
            />
          )}

          {/* Friend profile — opened from PlaceDetailSheet friend attribution */}
          {showFriendProfile && activeFriend && (
            <FriendProfilePage
              profile={activeFriend}
              dark={dark} accent={accent}
              currentUserId={user?.id}
              user={user}
              onBack={() => setShowFriendProfile(false)}
              onFriendshipChanged={() => setFriendsRefreshKey(k => k + 1)}
              zIndex={120}
            />
          )}

        </div>
      </div>

      {!isMobile && <TweaksPanel title="Tweaks">
        <TweakSection label="Theme"/>
        <TweakToggle label="Dark mode" value={t.dark} onChange={(v) => setTweak('dark', v)}/>
        <TweakColor label="Accent" value={t.accent} onChange={(v) => setTweak('accent', v)}/>
        <TweakSection label="Home screen variant"/>
        <TweakRadio
          label="Style"
          value={t.homeVariant}
          options={[
            { value: 'minimal', label: 'Minimal' },
            { value: 'photo', label: 'Photo pins' },
            { value: 'editorial', label: 'Editorial' },
          ]}
          onChange={(v) => setTweak('homeVariant', v)}
        />
        <TweakSection label="Navigate"/>
        <TweakButton label="Home / Globe" onClick={() => { setScreen('home'); resetSheets(); setShowLog(false); }}/>
        <TweakButton label="Friends globe" onClick={() => { setScreen('friends'); resetSheets(); setShowLog(false); }}/>
        <TweakButton label="Profile" onClick={() => { setScreen('profile'); resetSheets(); setShowLog(false); }}/>
        <TweakButton label="Log entry flow" onClick={() => { setScreen('home'); resetSheets(); setShowLog(true); }}/>
        <TweakButton label="Place detail (Bar Buca)" onClick={() => { setScreen('home'); setActivePin('e1'); setShowPreview(true); setShowDetail(true); setShowLog(false); }}/>
        <TweakSection label="Auth"/>
        <TweakButton label="Sign out (show onboarding)" onClick={() => { resetSheets(); setShowLog(false); handleSignOut(); }}/>
      </TweaksPanel>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
